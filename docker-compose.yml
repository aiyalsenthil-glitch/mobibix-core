services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: mobibix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mobibix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS Backend API
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: development
    container_name: mobibix-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://postgres.kpskhmjqvuncrtgthsxf:m5gztfER4UP2TVgD@aws-1-ap-south-1.pooler.supabase.com:6543/postgres"
      JWT_SECRET: ${JWT_SECRET:-your-development-jwt-secret-change-me}
      JWT_EXPIRES_IN: "7d"
      PORT: 3000
      GOOGLE_APPLICATION_CREDENTIALS: /app/secrets/REMOVED_AUTH_PROVIDER-admin.json
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      WHATSAPP_ENABLED: ${WHATSAPP_ENABLED}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_WABA_ID: ${WHATSAPP_WABA_ID}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      ANDROID_LATEST_VERSION_CODE: ${ANDROID_LATEST_VERSION_CODE}
      ANDROID_MIN_REQUIRED_VERSION_CODE: ${ANDROID_MIN_REQUIRED_VERSION_CODE}
    ports:
      - "3000:3000"
      - "9229:9229"
    volumes:
      - ./apps/backend/src:/app/src:cached
      - ./apps/backend/prisma:/app/prisma:cached
      - ./apps/backend/secrets:/app/secrets:ro
      - backend_node_modules:/app/node_modules
    command: npm run start:dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost_REPLACED:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js Frontend
  mobibix-web:
    build:
      context: .
      dockerfile: apps/mobibix-web/Dockerfile
      target: development
    container_name: mobibix-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost_REPLACED:3000/api
      NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
    ports:
      - "3001:3000"
    volumes:
      - ./apps/mobibix-web/src:/app/src:cached
      - ./apps/mobibix-web/app:/app/app:cached
      - ./apps/mobibix-web/public:/app/public:cached
      - ./apps/mobibix-web/lib:/app/lib:cached
      - mobibix_web_next:/app/.next
      - mobibix_web_node_modules:/app/node_modules
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
    driver: local
  backend_node_modules:
    driver: local
  mobibix_web_node_modules:
    driver: local
  mobibix_web_next:
    driver: local
