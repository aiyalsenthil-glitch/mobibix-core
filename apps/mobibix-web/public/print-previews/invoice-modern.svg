<svg width="140" height="200" viewBox="0 0 210 297" xmlns="http://www.w3.org/2000/svg">
  <!-- Paper Background -->
  <rect width="210" height="297" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Modern Header - Split -->
  <rect x="20" y="20" width="30" height="10" rx="1" fill="#334155"/>
  <rect x="20" y="35" width="60" height="3" rx="0.5" fill="#94a3b8"/>
  <rect x="20" y="40" width="50" height="3" rx="0.5" fill="#cbd5e1"/>
  
  <text x="180" y="30" text-anchor="end" font-family="sans-serif" font-size="20" fill="#e2e8f0" font-weight="bold">INVOICE</text>

  <!-- Split Meta -->
  <rect x="20" y="60" width="80" height="30" rx="2" fill="#f8fafc"/>
  <rect x="110" y="60" width="80" height="30" rx="2" fill="#f8fafc"/>
  
  <rect x="25" y="65" width="20" height="3" fill="#cbd5e1"/>
  <rect x="25" y="70" width="50" height="4" fill="#64748b"/>
  
  <rect x="115" y="65" width="20" height="3" fill="#cbd5e1"/>
  <rect x="115" y="70" width="50" height="4" fill="#64748b"/>

  <!-- Items - Open (No side borders) -->
  <line x1="20" y1="110" x2="190" y2="110" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="20" y="115" width="170" height="6" fill="#fff"/>
  <rect x="20" y="125" width="170" height="6" fill="#f8fafc"/>
  <rect x="20" y="135" width="170" height="6" fill="#fff"/>
  <rect x="20" y="145" width="170" height="6" fill="#f8fafc"/>

  <!-- Totals - Clean Right Align -->
  <rect x="130" y="170" width="60" height="30" rx="2" fill="#fff"/>
  <rect x="130" y="175" width="60" height="4" fill="#f1f5f9"/>
  <rect x="130" y="185" width="60" height="4" fill="#f1f5f9"/>
  <rect x="130" y="200" width="60" height="6" fill="#334155"/>

  <!-- Footer -->
  <rect x="20" y="270" width="170" height="1" fill="#cbd5e1"/>
</svg>
