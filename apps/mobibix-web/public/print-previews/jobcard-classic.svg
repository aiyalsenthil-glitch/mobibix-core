<svg width="140" height="200" viewBox="0 0 210 297" xmlns="http://www.w3.org/2000/svg">
  <!-- Paper Background -->
  <rect width="210" height="297" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Header -->
  <rect x="20" y="20" width="20" height="20" rx="2" fill="#cbd5e1"/>
  <rect x="50" y="20" width="80" height="10" rx="2" fill="#334155"/>
  <rect x="50" y="32" width="60" height="4" rx="1" fill="#94a3b8"/>
  
  <!-- JOB CARD label -->
  <rect x="150" y="20" width="40" height="15" stroke="#334155" stroke-width="2" fill="none"/>
  
  <!-- Status Box -->
  <rect x="150" y="40" width="30" height="8" rx="2" fill="#e2e8f0"/>

  <!-- Customer Box -->
  <rect x="20" y="60" width="170" height="30" rx="2" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="25" y="65" width="40" height="4" fill="#cbd5e1"/>
  <rect x="25" y="72" width="60" height="6" fill="#334155"/>
  <rect x="120" y="65" width="30" height="4" fill="#cbd5e1"/>
  <rect x="120" y="72" width="30" height="6" fill="#334155"/>

  <!-- Device Table -->
  <rect x="20" y="100" width="170" height="60" rx="2" fill="#fff" stroke="#e2e8f0"/>
  <rect x="20" y="100" width="170" height="10" fill="#f1f5f9"/>
  <line x1="80" y1="100" x2="80" y2="160" stroke="#e2e8f0"/>
  <rect x="25" y="115" width="40" height="6" fill="#334155"/>
  <rect x="85" y="115" width="80" height="4" fill="#64748b"/>
  <rect x="85" y="122" width="60" height="4" fill="#94a3b8"/>

  <!-- Notes Box -->
  <rect x="20" y="170" width="170" height="40" rx="2" fill="#fef9c3" stroke="#fefce8"/>
  <rect x="25" y="175" width="30" height="4" fill="#ca8a04"/>
  <rect x="25" y="185" width="140" height="3" fill="#475569"/>

  <!-- Footer Signature -->
  <rect x="130" y="250" width="60" height="1" fill="#334155"/>
  <rect x="135" y="255" width="50" height="4" fill="#94a3b8"/>
  
  <!-- QR -->
  <rect x="90" y="260" width="30" height="30" fill="#e2e8f0"/>
</svg>
