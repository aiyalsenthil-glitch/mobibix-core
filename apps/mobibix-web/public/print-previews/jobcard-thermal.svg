<svg width="120" height="240" viewBox="0 0 80 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Paper Background -->
  <rect width="80" height="200" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Header -->
  <rect x="20" y="10" width="40" height="8" rx="1" fill="#334155"/>
  <rect x="25" y="20" width="30" height="2" rx="0.5" fill="#94a3b8"/>

  <line x1="10" y1="30" x2="70" y2="30" stroke="#000" stroke-width="0.5" stroke-dasharray="1 1"/>

  <!-- Job Info -->
  <rect x="10" y="35" width="20" height="4" fill="#334155"/>  <rect x="40" y="35" width="30" height="4" fill="#000"/>
  <rect x="10" y="42" width="20" height="3" fill="#94a3b8"/>  <rect x="40" y="42" width="25" height="3" fill="#64748b"/>
  
  <rect x="10" y="50" width="60" height="6" rx="1" fill="#e2e8f0"/> <!-- Status -->

  <line x1="10" y1="60" x2="70" y2="60" stroke="#000" stroke-width="0.5" stroke-dasharray="1 1"/>

  <!-- Customer -->
  <rect x="10" y="65" width="20" height="3" fill="#94a3b8"/>
  <rect x="10" y="70" width="40" height="4" fill="#334155"/>
  <rect x="10" y="75" width="30" height="3" fill="#64748b"/>

  <line x1="10" y1="85" x2="70" y2="85" stroke="#000" stroke-width="0.5" stroke-dasharray="1 1"/>

  <!-- Device -->
  <rect x="10" y="90" width="20" height="3" fill="#94a3b8"/>
  <rect x="10" y="95" width="50" height="4" fill="#334155"/>
  <rect x="10" y="100" width="60" height="2" fill="#64748b"/>

  <line x1="10" y1="110" x2="70" y2="110" stroke="#000" stroke-width="0.5" stroke-dasharray="1 1"/>

  <!-- QR -->
  <rect x="20" y="120" width="40" height="40" fill="#e2e8f0"/>

  <rect x="10" y="170" width="60" height="3" fill="#334155" rx="1.5"/>
  <rect x="25" y="175" width="30" height="2" fill="#94a3b8"/>
</svg>
