<svg width="140" height="200" viewBox="0 0 210 297" xmlns="http://www.w3.org/2000/svg">
  <rect width="210" height="297" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Compact Content (Top Half Only representation) -->
  <rect x="20" y="20" width="170" height="130" fill="#fff" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="2 2"/>
  
  <!-- Dense Header -->
  <rect x="25" y="25" width="160" height="20" fill="#f1f5f9"/>
  <rect x="30" y="30" width="10" height="10" fill="#334155"/>
  <rect x="45" y="30" width="60" height="4" fill="#475569"/>
  <rect x="45" y="36" width="40" height="2" fill="#94a3b8"/>
  
  <rect x="140" y="30" width="40" height="4" fill="#64748b"/>
  
  <!-- Dense Table -->
  <rect x="25" y="50" width="160" height="50" fill="#fff"/>
  <line x1="25" y1="60" x2="185" y2="60" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="25" y1="70" x2="185" y2="70" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="25" y1="80" x2="185" y2="80" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="25" y1="90" x2="185" y2="90" stroke="#f1f5f9" stroke-width="1"/>
  
  <!-- Totals Right Aligned -->
  <rect x="120" y="105" width="65" height="20" fill="#f8fafc"/>
  <rect x="140" y="120" width="40" height="4" fill="#334155"/>
