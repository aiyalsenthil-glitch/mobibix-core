<svg width="140" height="200" viewBox="0 0 210 297" xmlns="http://www.w3.org/2000/svg">
  <rect width="210" height="297" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Thick Header Border -->
  <rect x="20" y="20" width="170" height="8" fill="#1e293b"/>
  
  <!-- Header Grid -->
  <rect x="20" y="35" width="80" height="10" rx="1" fill="#334155"/>
  <rect x="20" y="50" width="60" height="4" fill="#94a3b8"/>
  <rect x="20" y="56" width="50" height="4" fill="#94a3b8"/>

  <rect x="130" y="35" width="60" height="8" fill="#475569"/>
  <rect x="130" y="50" width="30" height="4" fill="#cbd5e1"/>
  <rect x="170" y="50" width="20" height="4" fill="#64748b"/>
  
  <!-- Boxed Areas -->
  <rect x="20" y="70" width="85" height="40" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="105" y="70" width="85" height="40" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  
  <!-- Grid Table -->
  <rect x="20" y="120" width="170" height="80" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="20" y1="135" x2="190" y2="135" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="20" y1="150" x2="190" y2="150" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="20" y1="165" x2="190" y2="165" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="20" y1="180" x2="190" y2="180" stroke="#cbd5e1" stroke-width="1"/>
  
  <!-- Totals Boxed -->
  <rect x="20" y="210" width="100" height="40" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="120" y="210" width="70" height="40" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="130" y="235" width="50" height="10" fill="#1e293b"/>
</svg>
