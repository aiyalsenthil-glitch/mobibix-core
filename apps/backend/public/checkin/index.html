<!doctype html>
<html>
  <head>
    <title>Gym Check-in</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
      }

      .card {
        background: #ffffff;
        color: #333;
        width: 100%;
        max-width: 380px;
        padding: 24px;
        border-radius: 16px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: 26px;
      }

      .subtitle {
        margin-top: 6px;
        font-size: 14px;
        color: #666;
      }

      input {
        width: 100%;
        padding: 14px;
        font-size: 16px;
        margin-top: 20px;
        border-radius: 10px;
        border: 1px solid #ccc;
      }

      button {
        width: 100%;
        padding: 14px;
        margin-top: 16px;
        font-size: 16px;
        border-radius: 10px;
        border: none;
        background: #2c5364;
        color: #fff;
        cursor: pointer;
      }

      button:hover {
        background: #203a43;
      }

      .error {
        color: #d9534f;
        margin-top: 10px;
        font-size: 14px;
      }

      .warning {
        color: #f0ad4e;
        margin-top: 12px;
        font-weight: 500;
      }

      .success {
        color: #28a745;
        font-size: 18px;
        font-weight: 600;
        margin-top: 16px;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>Welcome to Gym Attendance Management 💪</h1>
      <div class="subtitle">Your fitness journey starts here</div>

      <!-- STEP 1 -->
      <div id="stepPhone">
        <input id="phone" placeholder="Enter mobile number" />
        <button onclick="lookup()">Continue</button>
        <div id="phoneError" class="error"></div>
      </div>

      <!-- STEP 2 -->
      <div id="stepConfirm" style="display: none">
        <p id="memberName" style="font-size: 18px; font-weight: 600"></p>
        <p id="paymentInfo" class="warning"></p>
        <button id="confirmBtn" onclick="confirmAction()">Confirm</button>
      </div>

      <!-- STEP 3 -->
      <div id="stepResult" style="display: none">
        <div id="resultMessage" class="success"></div>
      </div>
    </div>

    <script src="checkin.js"></script>
  </body>
</html>
